apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: cluster-resource-quotas
spec:
  schema:
    apiVersion: v1alpha1
    kind: ClusterResourceQuotas
    scope: Cluster
    spec:
      teamName: string | required=true
      description: string | default="Tracks aggregate quotas for a team."
      budget: "map[string]string"
    status:
      quotaCount: ${string(size(quotas))}
      totalHard:
        requests:
          cpu: ${string(int(quotas.map(q, quantity(string(q.spec.?hard.orValue({})[?'requests.cpu'].orValue('0'))).asApproximateFloat()).sum()))}
          memory: ${string(int(quotas.map(q, quantity(string(q.spec.?hard.orValue({})[?'requests.memory'].orValue('0'))).asApproximateFloat()).sum()))}
        limits:
          cpu: ${string(int(quotas.map(q, quantity(string(q.spec.?hard.orValue({})[?'limits.cpu'].orValue('0'))).asApproximateFloat()).sum()))}
          memory: ${string(int(quotas.map(q, quantity(string(q.spec.?hard.orValue({})[?'limits.memory'].orValue('0'))).asApproximateFloat()).sum()))}

  resources:
    # 1. Discover all ResourceQuotas labeled for this team (cross-namespace)
    - id: quotas
      externalRef:
        apiVersion: v1
        kind: ResourceQuota
        metadata:
          selector:
            matchExpressions:
              - key: team
                operator: In
                values: ["${schema.spec.teamName}"]

    # 2. Kyverno policy: Enforce team budget on new ResourceQuotas
    - id: budgetPolicy
      includeWhen:
        - ${schema.spec.budget[?'requests.cpu'].orValue('0') != '0' || schema.spec.budget[?'requests.memory'].orValue('0') != '0'}
      template:
        apiVersion: policies.kyverno.io/v1beta1
        kind: ValidatingPolicy
        metadata:
          name: validate-quota-${schema.spec.teamName}
        spec:
          evaluation:
            background:
              enabled: false
          matchConstraints:
            objectSelector:
              matchExpressions:
              - key: team
                operator: In
                values: ["${schema.spec.teamName}"]
            resourceRules:
            - apiGroups: [""]
              apiVersions: ["v1"]
              operations: ["CREATE", "UPDATE"]
              resources: ["resourcequotas"]
          validationActions:
          - Deny
          variables:
          - name: other_team_quotas
            expression: >-
              dyn(resource.List("v1", "resourcequotas", "").items).filter(q, q.metadata.?labels.orValue({})[?'team'].orValue('') == "${schema.spec.teamName}" && q.metadata.name != object.metadata.name)
          - name: current_cpu_usage
            expression: >-
              dyn(variables.other_team_quotas).map(q, quantity(string(q.spec.?hard.orValue({})[?'requests.cpu'].orValue('0'))).asApproximateFloat()).sum()
          - name: current_mem_usage
            expression: >-
              dyn(variables.other_team_quotas).map(q, quantity(string(q.spec.?hard.orValue({})[?'requests.memory'].orValue('0'))).asApproximateFloat()).sum()
          - name: requested_cpu
            expression: >-
              quantity(string(object.spec.hard['requests.cpu'])).asApproximateFloat()
          - name: requested_mem
            expression: >-
              quantity(string(object.spec.hard['requests.memory'])).asApproximateFloat()
          - name: budget_cpu
            expression: >-
              quantity("${schema.spec.budget['requests.cpu']}").asApproximateFloat()
          - name: budget_mem
            expression: >-
              quantity("${schema.spec.budget['requests.memory']}").asApproximateFloat()
          validations:
          - expression: >-
              dyn(variables.requested_cpu) + variables.current_cpu_usage <= variables.budget_cpu
            messageExpression: >-
              "Team budget exceeded for '${schema.spec.teamName}'. CPU request would bring total to " + string(dyn(variables.requested_cpu) + variables.current_cpu_usage) + ", but budget is ${schema.spec.budget['requests.cpu']}."
          - expression: >-
              dyn(variables.requested_mem) + variables.current_mem_usage <= variables.budget_mem
            messageExpression: >-
              "Team budget exceeded for '${schema.spec.teamName}'. Memory request would bring total to " + string(dyn(variables.requested_mem) + variables.current_mem_usage) + ", but budget is ${schema.spec.budget['requests.memory']}."
